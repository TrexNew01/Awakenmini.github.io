<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hi, <span id="user-name">User</span>!</h1>
        <p>This is a simple personal Telegram Mini App for testing.</p>
        <button id="test-btn">Test Button</button>
        <div id="result"></div>
    </div>
    
    <div id="factions" class="factions-container">
        <button class="faction-btn" data-faction="Ring">💍 Ring</button>
        <button class="faction-btn" data-faction="Rebels">🚀 Rebels</button>
        <button class="faction-btn" data-faction="Alliance">🤝 Alliance</button>
        <button class="faction-btn" data-faction="Syndicate">💰 Syndicate</button>
        <button class="faction-btn" data-faction="Order">⚔️ Order</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
