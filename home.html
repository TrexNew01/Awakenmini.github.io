<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faction Home - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="home-container">
        <button id="back-btn" class="back-btn">← Back</button>

        <h1 id="faction-title">Ring Faction Pinterest</h1>
        <div id="faction-gallery" class="pinterest-gallery"></div>
        <p id="faction-desc">Premium 3D assets & scans. Scroll & explore! 💎</p>
    </div>


    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const faction = urlParams.get('faction') || 'Unknown';
        document.getElementById('faction-title').textContent = faction + ' Home';
        



        // Ring faction - Pinterest gallery with new images
        const ringImages = [
            'Ring image/Ring1.jpg',
            'Ring image/Ring2.jpg',
            'Ring image/Ring3.jpg',
            'Ring image/Ring4.jpg',
            'Ring image/Ring5.jpg',
            'Ring image/Ring6.jpg',
            'Ring image/Ring7.jpg',
            'Ring image/Ring8.jpg',
            'Ring image/Ring9.jpg',
            'Ring image/BPR_Composite.jpg',
            'Ring image/gaot.PNG',
            'Ring image/gaot2.PNG'
        ];


        if (faction === 'Ring') {
            const gallery = document.getElementById('faction-gallery');
            ringImages.forEach((imgSrc, index) => {
                const imgContainer = document.createElement('div');
                imgContainer.className = 'img-container';
                const img = document.createElement('img');
                img.src = imgSrc;
                img.alt = `Ring image ${index + 1}`;
                img.className = 'gallery-img';
                img.style.height = (180 + Math.random() * 120) + 'px'; // Random heights for Pinterest
                imgContainer.appendChild(img);
                gallery.appendChild(imgContainer);
            });

            document.getElementById('faction-desc').innerHTML = `Ring Faction Pinterest (${ringImages.length} premium images) <br> Updated with new Ring image collection 💎✨`;

            tg.HapticFeedback.impactOccurred('heavy');
        } else {

            const img = document.createElement('img');
            img.src = 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=400&h=300&fit=crop';
            img.alt = faction + ' image';
            img.className = 'faction-image';
            document.getElementById('faction-gallery').appendChild(img);
            document.getElementById('faction-desc').textContent = 'Welcome to ' + faction + '!';
        }



        document.getElementById('back-btn').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
