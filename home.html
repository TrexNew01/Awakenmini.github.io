<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faction Home - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <div class="home-container">
        <button id="back-btn" class="back-btn">← Back</button>

        <h1 id="faction-title">Ring Faction Pinterest Pro ✨</h1>
        <div id="image-counter" class="image-counter">0 / 12</div>
        <div id="faction-gallery" class="pinterest-gallery"></div>
        <p id="faction-desc">Premium 3D assets & scans. Click to zoom & share! 💎</p>
        
        <!-- Lightbox Modal -->
        <div id="lightbox" class="lightbox">
            <span id="lightbox-close">&times;</span>
            <img id="lightbox-img" src="">
            <div id="lightbox-caption"></div>
        </div>
    </div>



    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const faction = urlParams.get('faction') || 'Unknown';
        document.getElementById('faction-title').textContent = faction + ' Home';
        



        // Ring faction - Pinterest gallery with new images
        const ringImages = [
            'Ring image/Ring1.jpg',
            'Ring image/Ring2.jpg',
            'Ring image/Ring3.jpg',
            'Ring image/Ring4.jpg',
            'Ring image/Ring5.jpg',
            'Ring image/Ring6.jpg',
            'Ring image/Ring7.jpg',
            'Ring image/Ring8.jpg',
            'Ring image/Ring9.jpg',
            'Ring image/BPR_Composite.jpg',
            'Ring image/gaot.PNG',
            'Ring image/gaot2.PNG'
        ];


        if (faction === 'Ring') {
            const gallery = document.getElementById('faction-gallery');

        // Shuffle images for fresh experience
        ringImages.sort(() => Math.random() - 0.5);
        
        const counter = document.getElementById('image-counter');
        let currentImageIndex = 0;
        
        ringImages.forEach((imgSrc, index) => {
            const imgContainer = document.createElement('div');
            imgContainer.className = 'img-container';
            const img = document.createElement('img');
            img.src = imgSrc;
            img.alt = `Ring Premium Asset #${index + 1}`;
            img.title = `Ring Asset #${index + 1}`;
            img.className = 'gallery-img';
            img.style.height = (200 + Math.random() * 140) + 'px';
            img.dataset.index = index;
            imgContainer.appendChild(img);
            gallery.appendChild(imgContainer);
            
            // Click to open lightbox
            img.addEventListener('click', () => {
                tg.HapticFeedback.impactOccurred('medium');
                currentImageIndex = index;
                updateCounter();
                openLightbox(imgSrc, `Ring Premium Asset #${index + 1}`);
            });
        });
        
        function updateCounter() {
            counter.textContent = `${currentImageIndex + 1} / ${ringImages.length}`;
        }



        // Lightbox functions
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');
        const lightboxClose = document.getElementById('lightbox-close');

        function openLightbox(src, caption) {
            lightboxImg.src = src;
            lightboxCaption.textContent = caption;
            lightbox.classList.add('active');
            tg.expand();
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        document.getElementById('faction-desc').innerHTML = `Ring Faction Pinterest Pro (${ringImages.length} premium images) <br> Click to zoom, ESC to close 💎✨`;

        tg.HapticFeedback.impactOccurred('heavy');

        } else {

            const img = document.createElement('img');
            img.src = 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=400&h=300&fit=crop';
            img.alt = faction + ' image';
            img.className = 'faction-image';
            document.getElementById('faction-gallery').appendChild(img);
            document.getElementById('faction-desc').textContent = 'Welcome to ' + faction + '!';
        }



        document.getElementById('back-btn').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('light');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
